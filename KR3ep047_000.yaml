body:
  text: 一中風案右半身不遂脈來虛軟元氣不足也法宜溫補西黨參三錢制白朮一錢半淨棗仁三錢歸身一錢半法半夏一錢半鹿角霜二錢炙甘草四分甜枸杞二錢朱茯神二錢加霞天膏二錢案陰液素虧而內風煽爍症屬偏枯法當柔劑養營春砂仁炒熟地五錢元紅花四分歸身一錢半淡蓯蓉一錢半茯神二錢柏子霜一錢半甘枸杞二錢川斷二錢淨棗仁二錢酒桑枝四錢案症屬偏枯內熱脈數西黨參三錢女貞子二錢甘枸杞二錢川斷二錢茯神二錢大熟地四錢炙龜板四錢柏子霜一錢半炒歸身二錢案右膝腫痛筋拘不仁此營虛挾濕也宜標本兼顧生白芍一錢半大熟地四錢甘枸杞二錢鹿角霜二錢赤苓三錢厚杜仲一錢半宣木瓜一錢半五加皮一錢半川斷二錢加油松節一錢半案舌本不利四末不仁氣鬱挾痰也擬疏氣滌痰法以圖問安黨參三錢炒茅朮一錢半酒半夏一錢半遠志一錢炒杜蘇子三錢鬱金二錢白蒺藜三錢新會皮一錢半歸身一錢半加酒桑枝四錢案右肢偏廢六脈模糊乃陽氣虛而濕痰內滯擬燥土滌痰佐以活絡法制於術一錢半炒茅朮一錢半法半夏一錢半橘紅一錢炒歸身一錢半片薑黃一錢鹿角霜二錢甘枸杞二錢茯苓三錢加細桑枝五錢絲瓜絡二錢案肢麻言蹇脈來無力此陽氣虧而痰滯脈絡也殊非小恙生白芍一錢半川桂枝八分法半夏一錢半橘紅一錢煨明天麻一錢半炒歸身一錢半片薑黃一錢炒遠志一錢茯神二錢案心悸骨痛筋惕肉瞤血虛風動也從三陰培養制首烏三錢甘枸杞二錢歸身一錢半茯神二錢煨明天麻一錢半懷牛膝二錢柏子霜一錢半川斷二錢淨棗仁三錢案統體麻木二便艱難血虛風動也治以溫潤黨參二錢枸杞二錢蓯蓉一錢半煨明天麻一錢半茯苓三錢熟地五錢歸身一錢半柏子霜一錢半懷膝炭二錢案沈左人之所以能運動者先天之真陽也陽之清者為魂靈機出焉陽生陰脾陽根命火心營君火所生火下交腎出陽衰則大弱陰無從生心脾失養舌胖少液艱於語言靈機時窒脈和兩尺濡細擬方專主溫補懷熟地六錢生黃耆二錢五味子三分鹿角霜四錢橘紅一錢茯神三錢人參一錢炒棗仁三錢製附子七分懷牛膝一錢半澤瀉一錢半加龍眼三枚案徐左脾開竅於舌又舌為心之苗病後液虧心脾失於滋養舌大而蹇脈浮弦略數擬用溫養人參一錢棗仁三錢丹參二錢歸身一錢半法半夏一錢半橘紅一錢抱木茯神三錢於術一錢半桂心三分加龍眼五枚案心脾氣液兩虧舌根蹇澀脈形濡澀專主培補參豁痰利竅高麗參一錢半炒棗仁三錢丹參二錢制南星三分於術一錢半茯神三錢炙綿耆一錢炒歸身二錢橘紅一錢法半夏一錢半遠志一錢加龍眼五枚案徐舌根於心而其運動之機在脾氣液兩虧心脾失調舌本蹇澀語音不清症本於虛阻之者疫氣也目系在心而為肝竅目不能轉亦屬於虛脈濡而澀並不弦急專主培補當審其機更須節勞調養高麗參三錢橘紅一錢茯神二錢蒺藜三錢半夏一錢半加龍眼肉五枚棗仁三錢於術一錢半乾薑五分枳殼一錢半遠志一錢川連糯米粉炒三分案張左肝腎陰虧筋脈失養寒從下襲由足指及兩踝痛發戰連次此由稟體素弱精血不足當用溫養脈弦而長擬方常服熟地六錢鹿角霜四錢肥知母二錢棗仁三錢茯神三錢胡桃三錢當歸二錢懷牛膝一錢半生綿耆二錢枸杞二錢新會一錢加桂圓四枚又此方主發時服溫筋宣絡桂枝四分宣木瓜一錢半川石斛三錢獨活一錢半橘絡八分懷牛膝一錢半當歸二錢加桑枝五錢鮮忍冬藤五錢案胡右脾主四末肝主筋營液內虧風寒乘虛襲人右偏肢節酸楚脈濡左略弦此症以胃氣為主陽明為百絡之長穀食少則生血無多運藥亦不甚得力惟當長夏已和較易見效擬方甘平柔潤養胃和肝冀其漸復不用味苦氣劣之品恐礙胃氣也原生地五錢當歸二錢枸杞子三錢懷牛膝一錢半萆薢二錢茯神三錢生綿耆二錢香附三錢川石斛三錢宣木瓜一錢半橘絡八分加桑枝五錢忍冬藤五錢案秦左燥煩過度營液內虧心肝失養加之素體脾虛痰酒中積起患偏中右偏手足不仁現雖漸次平復而脈絡牽掣艱於舉動右脈尚和左寸關略見絃動面赤唇紅雖氣血並虧究系血虛失養浮火上炎凡經絡之藥多溫積氣成熱此症涼則滯絡熱則燥津惟以平劑滋養久服得效生綿耆二錢炒黨參二錢懷牛膝一錢半橘紅一錢炒棗仁三錢原生地五錢枸杞子二錢酒炒當歸二錢茯神三錢加桑枝五錢案脈左數右弦緩有年形盛氣衰冬春之交真氣不相繼續內風日熾左肢麻木不仁舌歪言蹇此屬中絡羚角片一錢半丹皮二錢橘紅一錢石斛三錢陳膽星五分鉤藤二錢菖蒲一錢半加薑汁炒竹茹四分案肝脾營虛癘風入絡絡熱傷筋四末掣腫漸及節骱肝主筋脾主四末此症難許見效治風先治血養營為主原生地五錢生綿耆二錢枸杞子二錢秦艽二錢牛膝一錢半酒炒當歸二錢宣木瓜一錢半海桐皮二錢獨活一錢半丹皮一錢加酒炒桑枝五錢案舌為心之苗又脾開竅於舌心脾液虧內失滋養舌強語澀脈來濡細滋補脾陰兼舒心系菖蒲炒熟地六錢冬朮一錢半炒棗仁三錢新會一錢梔子二錢川連炒丹參一錢歸身一錢遠志一錢茯苓三錢加龍眼五枚案舌強音不清心脾液虧脈來濡細專主滋補熟地六錢冬朮一錢半丹參二錢遠志一錢白蒺藜三錢萸肉二錢龍眼肉五枚黨參三錢歸身二錢茯神三錢橘紅一錢制香附三錢棗仁三錢二肝風案氣虛挾濕脾陽運遲木亦不達培中為主擬甘平之劑潞黨參三錢枸杞子二錢新會皮一錢茯神三錢菟絲子三錢杜於術一錢半法半夏一錢半歸身二錢澤瀉一錢半加胡桃肉三錢龍眼肉五枚案肝藏血用心過度心不能生肝之所藏亦耗木不滋則邪亢亢必侮土胃氣本虛脘次作痛連及兩脅肝之絡也木鬱達之木枯宜培養脈右濡而調左大不弦擬方以劑進參以溫煦從春令也高麗參一錢半水炙甘草三分安南肉桂四分新會皮七分茯神三錢炒遠志一錢炒棗仁三錢制透香附三錢枸杞子二錢炒黑歸身二錢澤瀉一錢半加沉香片三分案盛右心藏神肝藏魂心不生血肝木失養魂不得安木鬱不達必致侮土脾中虛土弱則木益不榮氣升不降君火被擾神靈無主陰盛而陽無所附時覺虛煩近乎癇厥血為心所生必得離火之化按脈左弦大而虛右濡澀不調統觀大象營氣並虧中無實火擬甘溫之劑補氣調營兼理奇脈心為離君火衰則無主肝為震木亢則厥藥必溫補不可用苦寒重鎮之品炒黨參三錢於術二錢歸身二錢棗仁三錢遠志一錢新會一錢上肉桂三分丹參二錢香附三錢杜仲二錢茯苓三錢加龍眼五枚復肝膽震巽同屬於木木鬱不達四火動心心陰火也木火引動君火營液內耗木失滋養中空無主煩擾不安肝藏魂血少則夜不得眠魂陽氣之最靈者也膽主決營虛則怯症純屬於虛虛者可補而其關於七情者則非藥力之所及右脈緊細而弦右關浮大寸略濡擬方以葉劑靜攝懷熟地六錢棗仁三錢歸身二錢香附三錢龍齒五錢茯神三錢新會一錢潞黨參三錢丹參二錢遠志一錢川芎一錢龜板五錢加龍眼肉五枚復大象與前相同而氣候則升天寒氣燥時當斂藏脈左大而時見虛弦右浮大而濡並無數象亦徑急心主血而藏神思慮生於脾肝藏魂而膽主決脾陽中虛氣不帥血血失無次內失滋養神魂不安心無主而事不能決與癇症異與怔忡亦異總之氣旺則神有所歸氣能生血則肝脾調而行止有序仍擬補參用溫疏懷熟地六錢於術一錢半乾薑五分肉桂三分茯苓三錢遠志潞黨參三錢棗仁三錢歸身二錢五味三分麥冬三錢新會加龍眼肉五枚案肝脾不調正弱則本邪時亢近感外風兼挾積酒留滯於太陽少陽二經蒸郁不達日晡發熱脘次不舒時或脹悶右脈見澀未宜進補姑擬疏泄茅朮一錢半炒枳實一錢半細桂枝四分陳皮一錢大腹皮一錢半加薄荷八分炒小朴一錢炒柴胡四分廣藿香一錢半茯苓三錢酒炒當歸二錢案腎陰下虛水不生木脾陽中虛土不敗木木旺則剋土土痛則亦剋水脾腎兩虛少陽風動虛之象也以靜制動當主培補砂仁炒熟地六錢於術一錢半新會皮一錢棗仁三錢遠志一錢肉桂三分鱉甲四錢梔子二錢福澤瀉一錢半加胡桃二錢復方去肉桂鱉甲加鹽水炒杜仲茯神甘菊熟地用牡蠣炒案右肝風挾痰上衝包絡氣滯則厥先笑而後肢節牽動脈來弦細包絡與肝同為厥陰故厥近心故笑擬用開法炒黨參三錢川連三分白蒺藜三錢丹參二錢橘紅一錢炒棗仁三錢半夏一錢半小枳殼一錢半茯神三錢加燈心一札案右肝主風風必有火巽之象也雖為火風火家人之象也傷於外者必反其家故必有外感而後發現當木令正旺暫輟補劑清肝養胃為主生地五錢山梔一錢半甘菊一錢茯神三錢當歸二錢天竺黃羚角一錢半橘紅一錢白芍一錢半川斛三錢蒺藜三錢加燈草案左太陽感風兼挾寒濕始因頸項不便流入左臂漸覺酸楚加以敷治臂臂松又發頭風肝陽未旺外風引動內風留滯於絡風為陽屬無定處也脈澀素體氣虛多痰現患尚輕宜擬宣理生地四錢秦艽二錢當歸二錢橘絡石斛三錢茯苓三錢羌活一錢半羚角一錢半桂枝四分枳殼一錢半薑黃一錢加桑枝五錢忍冬藤五錢案肝屬木得土以生得水以潤木托根於土所謂水者坎水為體營血為用土潤澤則木發榮虛者邪亢亢必侮土發時宜疏平時宜補擬方平時常服於術一錢半歸身二錢柴胡六分新會一錢艾絨一錢香附三錢白芍一錢半茯神三錢鬱金一錢杜仲二錢加玫瑰花二朵煨薑二片案頭風頻發太陽少陽兼症營液素虧脈來弦細難許脫根治風先治血肝脾兼理當歸二錢羌活一錢半薄荷八分橘紅一錢蒺藜三錢白芍一錢半柴胡六分茯苓三錢阿膠二錢藁本一錢加生薑兩片案肝脾兩虧虛風入腦舌中脫液當用滋攝熟地八錢菊花一錢橘紅二錢山梔一錢半澤瀉一錢半歸身二錢山藥二錢蒺藜三錢梔子二錢胡桃二個案肝主筋血虛則筋失養虛風內動時或掣急甚則反脹姑擬滋補熟地八錢秦艽二錢木瓜一錢半桂木六分川斷二錢歸身二錢杜仲二錢陳皮一錢獨活一錢半桑枝五錢案營虛風動蹺脈為病足攣難於行走脈來促數急切難愈生地五錢秦艽二錢木瓜一錢半新會一錢虎骨敲碎二錢當歸二錢杜仲二錢獨活一錢半梔子二錢桑枝七錢案肝脾不調脘次作脹氣阻於絡絡血外溢頭風時發脈來細澀當用宣理香附三錢橘紅一錢半蒺藜三錢丹皮二錢川芎一錢當歸二錢枳殼一錢半懷膝一錢半旋覆一錢半玫瑰花二朵案濕毒兼風多發紅瘰歸於營分擬用苦泄荊芥一錢半羌活一錢半秦艽二錢當歸二錢生草五分白蘚皮一錢半毛術一錢半赤苓三錢赤芍一錢半川芎一錢半新會一錢加冬瓜皮三錢案陽明遊風歸於營分現當燥令養血為主生地五錢首烏三錢新會一錢荊芥一錢半獨活一錢半秦艽二錢歸身二錢阿膠二錢茯神三錢蒼耳蒺藜三錢升麻四分豬膚案土不培木虛風上升脈來弦大當用調補冬朮一錢半羌活一錢半新會一錢鉤鉤四錢蔓荊子歸身二錢蒺藜三錢甘菊一錢懷膝一錢半化阿膠二錢案厥陽化風上冒頭暈目昏此血虛肝旺也宜養營以熄風制首烏二錢歸身一錢半白芍一錢半麥冬二錢白蒺藜三錢石決明五錢甘菊一錢冬桑葉二錢女貞子二錢案膈脹嘔惡飲食頓減肝風患胃也診脈象弦大暫擬苦泄法羚羊角一錢鬱金一錢新會皮一錢知母二錢石決明四錢半夏一錢半生甘草四分